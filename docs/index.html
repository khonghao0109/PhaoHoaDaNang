<!doctype html>
<html lang="vi">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>MyPictures Portfolio</title>
    <link rel="stylesheet" href="./style.css" />
    <meta name="description" content="Portfolio nhiếp ảnh cá nhân của khonghao0109" />
</head>

<body>
    <header class="topbar">
        <div class="wrap">
            <div class="brand">
                <div class="avatar" aria-hidden="true">📷</div>
                <div>
                    <div class="title">MyPictures</div>
                    <div class="subtitle">Portfolio ảnh & video — khonghao0109</div>
                </div>
            </div>

            <div class="controls">
                <input id="search" type="search" placeholder="Tìm album / từ khóa..." autocomplete="off" />
                <select id="filter" aria-label="Lọc album">
            <option value="all">Tất cả</option>
            <option value="AoDaiTet">Áo Dài Tết</option>
            <option value="YenTu29_01">Yên Tử</option>
            <option value="DoiSong_ThienNhien">Đời sống & Thiên nhiên</option>
            <option value="PhaoHoaDHD_XIV">Pháo hoa DHD XIV</option>
          </select>
            </div>
        </div>
    </header>

    <main class="wrap">
        <section class="hero">
            <h1>Kho ảnh theo chủ đề</h1>
            <p>Ảnh hiển thị trực tiếp từ GitHub.</p>
        </section>

        <!-- ===== ALBUMS ===== -->
        <section id="albums" class="albums"></section>
    </main>

    <!-- Lightbox / Image Viewer -->
    <div id="lightbox" class="lightbox" aria-hidden="true">
        <div class="lb-panel" role="dialog" aria-modal="true" aria-label="Xem ảnh">
            <div class="lb-top">
                <div class="lb-headtext">
                    <div class="lb-title" id="lbCaption"></div>
                    <div class="lb-desc multiline" id="lbDesc"></div>
                </div>
                <button class="lb-close" id="lbClose" aria-label="Đóng">✕</button>
            </div>

            <div class="lb-toolbar" aria-label="Công cụ ảnh">
                <button id="btnZoomOut" class="lb-btn">➖ Zoom</button>
                <button id="btnZoomIn" class="lb-btn">➕ Zoom</button>
                <button id="btnReset" class="lb-btn">↺ Reset</button>

                <span class="lb-sep"></span>

                <button id="btnRotate" class="lb-btn">⤾ Xoay 90°</button>
                <button id="btnFlipX" class="lb-btn">⇋ Lật ngang</button>
                <button id="btnFlipY" class="lb-btn">⇅ Lật dọc</button>
                <button id="btnGray" class="lb-btn">⬛ Đen trắng</button>

                <span class="lb-sep"></span>

                <button id="btnCrop" class="lb-btn lb-btn-warn">✂ Crop</button>
                <button id="btnDenoise" class="lb-btn">🧼 Khử nhiễu</button>
                <button id="btnApplyCrop" class="lb-btn" disabled>✅ Apply</button>
                <button id="btnClearCrop" class="lb-btn" disabled>🧹 Clear</button>

                <span class="lb-sep"></span>

                <a id="btnDownloadOriginal" class="lb-btn lb-link" href="#" download>
            ⬇ Tải gốc
          </a>
                <a id="btnDownloadEdited" class="lb-btn lb-link" href="#" download>
            ⬇ Tải đã chỉnh
          </a>
            </div>

            <div class="lb-stage">
                <canvas id="lbCanvas"></canvas>
                <div id="lbHint" class="lb-hint" hidden>
                    Kéo chuột để chọn vùng crop → bấm Apply
                </div>
            </div>
        </div>
    </div>

    <footer class="footer wrap">
        <div>© 2026 khonghao0109 • MyPictures Portfolio</div>
        <div class="links">
            <a href="https://github.com/khonghao0109/PhaoHoaDaNang" target="_blank" rel="noopener noreferrer">GitHub Repo</a
        >
        <span>•</span>
        <a href="mailto:khonghao0109@gmail.com">khonghao0109@gmail.com</a>
        </div>
    </footer>

    <script defer src="./app.js"></script>
</body>

</html>
